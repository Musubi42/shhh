version: 2

project_name: shhh

before:
  hooks:
    - go mod tidy

builds:
  - id: shhh
    main: ./cmd/shhh
    binary: shhh
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: shhh
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev+{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: Musubi42
    name: shhh
  draft: false
  prerelease: auto
  header: |
    ## shhh {{ .Tag }}

    shhh is a thin hook for coding agents (Claude Code, Codex, Cursor) that
    redacts secrets locally before they reach the LLM.

    See the [install instructions](https://github.com/Musubi42/shhh#install)
    for one-liners per platform.
  footer: |
    ---
    **Full changelog**: https://github.com/Musubi42/shhh/compare/{{ .PreviousTag }}...{{ .Tag }}

# Homebrew tap deferred to a later milestone. To re-enable, add a
# `brews:` section here and create the Musubi42/homebrew-shhh repo.
