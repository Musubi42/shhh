# GitHub secret scanning — path exclusions.
#
# shhh is a secret-redaction tool: its test fixtures and demo deliberately
# contain secret-shaped values. They are all fake. These directories are
# excluded so GitHub's scanner does not raise alerts on them.
#
# Note: this file only affects scanning ALERTS. Push protection on the
# very first push (before this file is on the default branch) is not
# covered — that one push must be allowed manually or with push
# protection temporarily disabled in repo settings.
paths-ignore:
  - "testdata/**"
  - "eval-corpus/**"
  - "demo/leaktest/**"
